<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13253e"/>
      <stop offset="100%" stop-color="#0b1929"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9965c"/>
      <stop offset="100%" stop-color="#e8c685"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9965c"/>
      <stop offset="100%" stop-color="#e8c685"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9965c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8c685" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle diagonal accent band -->
  <rect x="-100" y="-100" width="1400" height="4" fill="url(#accent)" opacity="0.25"
        transform="rotate(-3 600 315)"/>

  <!-- Rising chart (left side) -->
  <g transform="translate(80, 120)">
    <polyline points="0,300 80,210 160,245 245,120 330,155 420,60"
              fill="none" stroke="url(#accent)" stroke-width="14"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Peak dot -->
    <circle cx="420" cy="60" r="16" fill="#e8c685" filter="url(#glow)"/>
    <circle cx="420" cy="60" r="16" fill="#e8c685"/>
    <circle cx="420" cy="60" r="7" fill="#0b1929"/>
  </g>

  <!-- Wave (bottom) -->
  <path d="M0,540 Q200,500 400,530 Q600,560 800,530 Q1000,500 1200,530 L1200,630 L0,630 Z"
        fill="url(#wave)"/>
  <path d="M0,570 Q200,540 400,560 Q600,585 800,560 Q1000,540 1200,560 L1200,630 L0,630 Z"
        fill="url(#accent)" opacity="0.6"/>

  <!-- Main headline (right-aligned text block, centered vertically) -->
  <g transform="translate(620, 180)">
    <text x="0" y="0" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
          font-size="72" font-weight="800" fill="url(#textGrad)"
          letter-spacing="-2">CoastFIRE</text>
    <text x="0" y="60" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
          font-size="44" font-weight="500" fill="#e8ecf1"
          letter-spacing="4">CALCULATOR</text>

    <text x="0" y="150" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
          font-size="30" font-weight="400" fill="#8da3b8">
      Find the age you can stop saving —
    </text>
    <text x="0" y="192" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
          font-size="30" font-weight="400" fill="#8da3b8">
      and let compounding finish the job.
    </text>

    <!-- Feature chips -->
    <g transform="translate(0, 240)">
      <rect x="0"   y="0" width="160" height="40" rx="20" fill="none"
            stroke="url(#accent)" stroke-width="1.5"/>
      <text x="80" y="26" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
            font-size="16" font-weight="600" fill="#e8c685"
            text-anchor="middle">MONTE CARLO</text>

      <rect x="175" y="0" width="160" height="40" rx="20" fill="none"
            stroke="url(#accent)" stroke-width="1.5"/>
      <text x="255" y="26" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
            font-size="16" font-weight="600" fill="#e8c685"
            text-anchor="middle">TAX-AWARE</text>

      <rect x="350" y="0" width="175" height="40" rx="20" fill="none"
            stroke="url(#accent)" stroke-width="1.5"/>
      <text x="437" y="26" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
            font-size="16" font-weight="600" fill="#e8c685"
            text-anchor="middle">SS + PENSION</text>
    </g>

    <!-- Domain at bottom of text block -->
    <text x="0" y="360" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
          font-size="22" font-weight="600" fill="#e8ecf1"
          letter-spacing="3">COASTFIREFINANCE.COM</text>
  </g>
</svg>
