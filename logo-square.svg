<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13253e"/>
      <stop offset="100%" stop-color="#0b1929"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9965c"/>
      <stop offset="100%" stop-color="#e8c685"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9965c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8c685" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle ring accent -->
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none"
        stroke="url(#accentGrad)" stroke-width="2" opacity="0.35"/>

  <!-- Rising chart line with glow -->
  <polyline
    points="78,380 172,268 256,316 348,168 438,212"
    fill="none" stroke="url(#accentGrad)" stroke-width="34"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Dot at peak (the "coast" moment) -->
  <circle cx="438" cy="212" r="28" fill="#e8c685" filter="url(#glow)"/>
  <circle cx="438" cy="212" r="12" fill="#0b1929"/>

  <!-- Wave at bottom (the "coast") -->
  <path d="M40,420 Q128,390 216,418 Q304,446 392,418 Q456,398 472,410 L472,480 Q384,496 256,486 Q128,476 40,482 Z"
        fill="url(#waveGrad)"/>
  <path d="M40,440 Q128,414 216,438 Q304,462 392,438 Q456,422 472,432 L472,480 L40,480 Z"
        fill="url(#accentGrad)" opacity="0.55"/>

  <!-- CFF monogram (subtle, top-left) -->
  <text x="52" y="96" font-family="-apple-system, Segoe UI, Roboto, sans-serif"
        font-size="34" font-weight="800" fill="url(#accentGrad)"
        letter-spacing="2">CFF</text>
</svg>
